# =============================================================================
# docker-compose.prod.yml — Production-like Local Testing
# Overrides docker-compose.yml with production-optimized settings
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up
# =============================================================================

services:
  db:
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
        reservations:
          memory: 256M

  backend:
    restart: always
    environment:
      NODE_ENV: production
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
        reservations:
          memory: 128M

  frontend:
    restart: always
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
        reservations:
          memory: 128M
